<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>

  <!-- เอา tailwind.css มาใช้ -->
  <link rel="stylesheet" href="./output.css">
</head>

<body class="flex items-center justify-center min-h-screen bg-[hsl(30,38%,92%)] font-[Montserrat]">

  <main class="p-4">
    <div class="max-w-![600px] rounded-xl bg-white overflow-hidden md:flex">
      <!-- image -->
      <div class="h-![250px] md:h-auto md:w-1/2">
        <!-- ซ่อนตอนจอใหญ่ >= 768px  -->
        <img src="../images/image-product-mobile.jpg" alt="perfume" class="w-full h-full object-cover md:hidden" />

        <!-- ซ่อนตอน mobile แสดงตอน ≥768px -->
        <img src="../images/image-product-desktop.jpg" alt="perfume"
          class="w-full h-full object-cover hidden md:block" />

      </div>

      <!-- Content -->
      <div class="p-6 md:w-1/2">
        <p class="mb-4 text-[12px] text-[hsl(228,12%,48%) tracking-[0.25rem]">PERFUME</p>

        <h1 class="mb-4 text-[60px] text-[hsl(212,21%,14%)] leading-tight font-[Fraunces]">
          Gabrielle Essence Eau De Parfum
        </h1>

        <p class="mb-6 text-[14px] text-[hsl(228,12%,48%) leading-relaxed]">
          A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.
        </p>


        <!-- Price -->
        <div class="flex items-center gap-4 mb-6">
          <span class="text-[24px] text-[hsl(158,36%,37%)] font-[Fraunces] ">
            $149.99
          </span>

          <span class="text-sm text-[hsl(228,12%,48%)] line-through">
            $169.99
          </span>
        </div>

        <!-- button -->
        <button class="w-full pt-2 bg-[hsl(158,36%,37%)]
         text-white py-3 rounded-lg font-bold 
         flex items-center justify-center gap-2
          hover:bg-[hsl(158,42%,18%)] transition">
          🛒 Add to Cart
        </button>
      </div>
    </div>
  </main>
  <!-- 
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </footer> -->
</body>

</html>
